name: Platform - Deploy Azure Load Balancer

# This is a reusable workflow for deploying Azure Load Balancer infrastructure
on:
  workflow_call:
    inputs:
      environment:
        description: 'Environment name (dev, staging, prod)'
        required: true
        type: string
      tfvars_file:
        description: 'Path to terraform variables file'
        required: true
        type: string
      terraform_version:
        description: 'Terraform version to use'
        required: false
        type: string
        default: '1.5.0'
      backend_pool_ids: 
        description: 'Backend pool IDs from VM deployment'
        required: true
        type: string
    secrets:
      AZURE_CREDENTIALS:
        description: 'Azure credentials JSON for authentication'
        required: true
      AZURE_CLIENT_ID:
        description: 'Azure Service Principal Client ID'
        required: true
      AZURE_CLIENT_SECRET:
        description: 'Azure Service Principal Client Secret'
        required: true
      AZURE_SUBSCRIPTION_ID:
        description: 'Azure Subscription ID'
        required: true
      AZURE_TENANT_ID:
        description: 'Azure Tenant ID'
        required: true
      ARM_ACCESS_KEY:
        description: 'ARM Access Key for Terraform backend'
        required: true
      BACKEND_RESOURCE_GROUP:
        description: 'Backend storage resource group name'
        required: true
      BACKEND_STORAGE_ACCOUNT:
        description: 'Backend storage account name'
        required: true
      BACKEND_CONTAINER:
        description: 'Backend storage container name'
        required: true
    outputs:
      loadbalancer_id:
        description: 'Azure Load Balancer ID'
        value: ${{ jobs.deploy.outputs.loadbalancer_id }}
      loadbalancer_frontend_ip:
        description: 'Load Balancer Frontend IP'
        value: ${{ jobs.deploy.outputs.loadbalancer_frontend_ip }}
      loadbalancer_fqdn:
        description: 'Load Balancer FQDN'
        value: ${{ jobs.deploy.outputs.loadbalancer_fqdn }}

jobs:
  init:
    name: Validate Inputs
    runs-on: ubuntu-latest
    steps:
      - name: Validate environment
        run: |
          if [[ "${{ inputs.environment }}" != "dev" && "${{ inputs.environment }}" != "staging" && "${{ inputs.environment }}" != "prod" ]]; then
            echo "Invalid environment: ${{ inputs.environment }}"
            exit 1
          fi
          echo "✓ Environment validation passed"

  deploy:
    name: Deploy Load Balancer
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    needs: init
    outputs:
      loadbalancer_id: ${{ steps.terraform_output.outputs.loadbalancer_id }}
      loadbalancer_frontend_ip: ${{ steps.terraform_output.outputs.loadbalancer_frontend_ip }}
      loadbalancer_fqdn: ${{ steps.terraform_output.outputs.loadbalancer_fqdn }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          repository: vankadarasuresh/GitHub_Actions_Platform
          ref: main

      - name: Checkout Application Repo
        uses: actions/checkout@v4
        with:
          repository: vankadarasuresh/GitHub_Actions_Application
          ref: main
          path: application

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: ${{ inputs.terraform_version }}

      - name: Authenticate to Azure
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Terraform Init
        run: |
          cd terraform-modules/load-balancer
          terraform init \
            -backend-config="resource_group_name=${{ secrets.BACKEND_RESOURCE_GROUP }}" \
            -backend-config="storage_account_name=${{ secrets.BACKEND_STORAGE_ACCOUNT }}" \
            -backend-config="container_name=${{ secrets.BACKEND_CONTAINER }}" \
            -backend-config="key=load-balancer.tfstate"
        env:
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          ARM_ACCESS_KEY: ${{ secrets.ARM_ACCESS_KEY }}

      - name: Terraform Plan
        id: plan
        run: |
          cd terraform-modules/load-balancer
          terraform plan \
            -var-file="$GITHUB_WORKSPACE/application/${{ inputs.tfvars_file }}" \
            -var="backend_pool_ids=${{ inputs.backend_pool_ids }}" \
            -out=tfplan
        env:
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}

      - name: Terraform Apply
        id: apply
        continue-on-error: true
        run: |
          cd terraform-modules/load-balancer
          terraform apply -auto-approve tfplan
        env:
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}

      - name: Handle Apply Failure
        if: steps.apply.outcome == 'failure'
        run: |
          cd terraform-modules/load-balancer
          echo "Apply failed, refreshing state and retrying..."
          terraform apply -refresh-only -auto-approve
          terraform apply -auto-approve tfplan
        env:
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}

      - name: Capture Terraform Outputs
        id: terraform_output
        if: steps.apply.outcome == 'success' || steps.apply.outcome == 'skipped'
        continue-on-error: true
        run: |
          cd terraform-modules/load-balancer
          if terraform output -json > /dev/null 2>&1; then
            OUTPUTS=$(terraform output -json)
            echo "loadbalancer_id=$(echo $OUTPUTS | jq -r '.loadbalancer_id.value')" >> $GITHUB_OUTPUT
            echo "loadbalancer_frontend_ip=$(echo $OUTPUTS | jq -r '.loadbalancer_frontend_ip.value')" >> $GITHUB_OUTPUT
            echo "loadbalancer_fqdn=$(echo $OUTPUTS | jq -r '.loadbalancer_fqdn.value')" >> $GITHUB_OUTPUT
          else
            echo "No outputs available - terraform may not have completed successfully"
          fi

      - name: Azure Logout
        run: az logout
