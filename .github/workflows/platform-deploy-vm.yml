name: Platform - Deploy Azure Virtual Machines

# This is a reusable workflow for deploying Azure Virtual Machines infrastructure
on:
  workflow_call:
    inputs:
      environment:
        description: 'Environment name (dev, staging, prod)'
        required: true
        type: string
      tfvars_file:
        description: 'Path to terraform variables file'
        required: true
        type: string
      terraform_version:
        description: 'Terraform version to use'
        required: false
        type: string
        default: '1.5.0'
    secrets:
      AZURE_CREDENTIALS:
        description: 'Azure credentials JSON for authentication'
        required: true
      AZURE_CLIENT_ID:
        description: 'Azure Service Principal Client ID'
        required: true
      AZURE_CLIENT_SECRET:
        description: 'Azure Service Principal Client Secret'
        required: true
      AZURE_SUBSCRIPTION_ID:
        description: 'Azure Subscription ID'
        required: true
      AZURE_TENANT_ID:
        description: 'Azure Tenant ID'
        required: true
      ARM_ACCESS_KEY:
        description: 'ARM Access Key for Terraform backend'
        required: true
    outputs:
      vm_ids:
        description: 'Azure VM IDs'
        value: ${{ jobs.deploy.outputs.vm_ids }}
      vm_private_ips:
        description: 'VM Private IP Addresses'
        value: ${{ jobs.deploy.outputs.vm_private_ips }}
      vm_public_ips:
        description: 'VM Public IP Addresses'
        value: ${{ jobs.deploy.outputs.vm_public_ips }}
      network_interface_ids:
        description: 'Network Interface IDs'
        value: ${{ jobs.deploy.outputs.network_interface_ids }}

jobs:
  init:
    name: Validate Inputs
    runs-on: ubuntu-latest
    steps:
      - name: Validate environment
        run: |
          if [[ "${{ inputs.environment }}" != "dev" && "${{ inputs.environment }}" != "staging" && "${{ inputs.environment }}" != "prod" ]]; then
            echo "Invalid environment: ${{ inputs.environment }}"
            exit 1
          fi
          echo "✓ Environment validation passed"

  deploy:
    name: Deploy Virtual Machines
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    needs: init
    outputs:
      vm_ids: ${{ steps.terraform_output.outputs.vm_ids }}
      vm_private_ips: ${{ steps.terraform_output.outputs.vm_private_ips }}
      vm_public_ips: ${{ steps.terraform_output.outputs.vm_public_ips }}
      network_interface_ids: ${{ steps.terraform_output.outputs.network_interface_ids }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          repository: vankadarasuresh/GitHub_Actions_Platform
          ref: main

      - name: Checkout Application Repo
        uses: actions/checkout@v4
        with:
          repository: vankadarasuresh/GitHub_Actions_Application
          ref: main
          path: application

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: ${{ inputs.terraform_version }}

      - name: Authenticate to Azure
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Terraform Init
        run: |
          cd terraform-modules/virtual-machines
          terraform init \
            -backend-config="key=virtual-machines.tfstate"
        env:
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          ARM_ACCESS_KEY: ${{ secrets.ARM_ACCESS_KEY }}

      - name: Terraform Plan
        id: plan
        run: |
          cd terraform-modules/virtual-machines
          terraform plan -var-file="$GITHUB_WORKSPACE/application/${{ inputs.tfvars_file }}" -out=tfplan
        env:
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}

      - name: Terraform Apply
        run: |
          cd terraform-modules/virtual-machines
          terraform apply -auto-approve tfplan
        env:
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}

      - name: Capture Terraform Outputs
        id: terraform_output
        run: |
          cd terraform-modules/virtual-machines
          echo "vm_ids=$(terraform output -raw vm_ids)" >> $GITHUB_OUTPUT
          echo "vm_private_ips=$(terraform output -raw vm_private_ips)" >> $GITHUB_OUTPUT
          echo "vm_public_ips=$(terraform output -raw vm_public_ips)" >> $GITHUB_OUTPUT
          echo "network_interface_ids=$(terraform output -raw network_interface_ids)" >> $GITHUB_OUTPUT

      - name: Azure Logout
        run: az logout
